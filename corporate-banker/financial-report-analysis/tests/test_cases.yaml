# financial-report-analysis Skill 测试用例集
# 符合 METHODOLOGY.md 第7节测试与评估框架要求

test_cases:
  # ==================== 正例：正常场景 ====================
  
  - name: "标准分析 - 制造业上市公司贷前尽调"
    type: positive
    input:
      company_name: "XX制造有限公司"
      stock_code: "600XXX"
      report_period: "2023年报"
      analysis_scenario: "贷前尽调"
      credit_amount: 5000
    expected:
      contains:
        - "盈利能力分析"
        - "资产质量分析"
        - "负债与偿债能力"
        - "现金流分析"
        - "杜邦分析"
        - "财务预警扫描"
        - "综合评价与建议"
        - "毛利率"
        - "净利率"
        - "ROE"
        - "收现比"
        - "净现比"
        - "流动比率"
        - "速动比率"
        - "DSCR"
        - "有息负债率"
        - "利息保障倍数"
        - "自由现金流"
        - "免责声明"
      must_not_contain:
        - "投资建议"
        - "保证收益"
        - "年化收益率"
      disclaimer_present: true
      audit_log_generated: true

  - name: "风险预警分析 - 贸易公司逾期评估"
    type: positive
    input:
      company_name: "XX贸易公司"
      report_period: "2023年报"
      analysis_scenario: "风险预警"
      risk_event: "近期有逾期记录"
    expected:
      contains:
        - "盈利能力分析"
        - "资产质量分析"
        - "负债与偿债能力"
        - "现金流分析"
        - "杜邦分析"
        - "财务预警扫描"
        - "红色警示"
        - "红线"
        - "经营现金流"
        - "有息负债"
      must_not_contain:
        - "投资建议"
        - "保证收益"
      disclaimer_present: true
      red_flags_triggered: true

  - name: "年度贷后检视 - 存续客户定期评估"
    type: positive
    input:
      company_name: "XX科技公司"
      report_period: "2023年报"
      analysis_scenario: "年度贷后检视"
      existing_credit: 3000
    expected:
      contains:
        - "盈利能力分析"
        - "资产质量分析"
        - "负债与偿债能力"
        - "现金流分析"
        - "杜邦分析"
        - "财务预警扫描"
        - "财务健康评级"
        - "同比"
        - "趋势"
      must_not_contain:
        - "投资建议"
        - "保证收益"
      disclaimer_present: true
      audit_log_generated: true

  - name: "财务质量评估 - 盈利质量深度分析"
    type: positive
    input:
      company_name: "XX股份公司"
      report_period: "2021-2023年"
      analysis_scenario: "财务质量评估"
      focus_dimension: "盈利质量"
    expected:
      contains:
        - "盈利能力分析"
        - "收现比"
        - "净现比"
        - "核心利润占比"
        - "非经常性损益"
        - "盈利质量评估"
      must_not_contain:
        - "投资建议"
        - "保证收益"
      disclaimer_present: true

  - name: "勾稽关系验证 - 三表一致性检查"
    type: positive
    input:
      company_name: "XX集团"
      report_period: "2023年报"
      analysis_scenario: "数据验证"
    expected:
      contains:
        - "勾稽关系验证"
        - "资产负债表"
        - "现金流量表"
        - "利润表"
        - "一致"
      must_not_contain:
        - "投资建议"
        - "保证收益"
      disclaimer_present: true

  # ==================== 反例：超范围场景 ====================
  
  - name: "超范围 - 个人信贷财务分析"
    type: negative
    input:
      query: "帮我分析一下个人住房贷款的还款能力"
    expected:
      rejected: true
      contains:
        - "不在本 Skill 的服务范围"
        - "个人信贷"

  - name: "超范围 - 行业宏观分析"
    type: negative
    input:
      query: "请分析光伏行业的未来发展趋势"
    expected:
      rejected: true
      contains:
        - "行业分析"
        - "credit-industry-analysis"

  - name: "超范围 - 简单数据查询"
    type: negative
    input:
      query: "XX公司2023年的营收是多少？"
    expected:
      rejected: true
      contains:
        - "简单数据查询"
        - "不在本 Skill 的服务范围"

  # ==================== 边界案例：异常场景 ====================
  
  - name: "边界案例 - 数据不完整（仅1年报表）"
    type: edge_case
    input:
      company_name: "XX公司"
      report_period: "2023年报"
      data_completeness: "仅1年"
    expected:
      contains:
        - "数据不足"
        - "趋势分析不可用"
        - "单期分析"
      degraded_mode: true
      disclaimer_present: true

  - name: "边界案例 - 审计意见非标（带强调段）"
    type: edge_case
    input:
      company_name: "XX公司"
      report_period: "2023年报"
      audit_opinion: "带强调段的无保留意见"
    expected:
      contains:
        - "审计意见"
        - "带强调段"
        - "持续经营"
        - "警示"
      disclaimer_present: true
      audit_opinion_flagged: true

  - name: "边界案例 - 触发多条红线（R2+R5）"
    type: edge_case
    input:
      company_name: "XX贸易公司"
      report_period: "2023年报"
      red_flags:
        - "R2：经营现金流连续3年为负+有息负债增加"
        - "R5：应收增速超营收增速60pct"
    expected:
      contains:
        - "红色警示"
        - "R2"
        - "R5"
        - "暂停授信"
        - "待核实"
      disclaimer_present: true
      red_flags_triggered: true
