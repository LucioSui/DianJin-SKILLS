# 访前规划 Skill 测试用例

## 测试用例集

### 用例 1: 标准续贷跟进拜访（正例）

**输入**：
```
客户名称：明泰铝业有限公司
拜访日期：2026-05-15
拜访目的：续贷跟进
特殊关注点：客户授信5000万将于2026-06-20到期
```

**预期输出**：
- ✅ 包含"客户基本面回顾"章节
- ✅ 包含"近期动态分析"章节
- ✅ 包含"本次拜访目标"章节
- ✅ 包含"材料准备清单"章节
- ✅ 包含"沟通策略"章节
- ✅ 拜访类型标注为"续贷跟进"
- ✅ 主目标数量为1-3个
- ✅ 包含授信到期时间信息
- ✅ 包含续贷意向确认相关目标
- ✅ 行业分类精确到中类或小类（非仅"制造业"）
- ✅ 免责声明存在

---

### 用例 2: 风险排查拜访（正例 - 有风险信号）

**输入**：
```
客户名称：XX贸易有限公司
拜访日期：2026-05-12
拜访目的：风险排查
特殊关注点：客户近期有逾期记录，工商系统显示2条被执行信息
```

**预期输出**：
- ✅ 包含所有必需章节
- ✅ 拜访类型标注为"风险排查"
- ✅ ⚠️ 风险提示章节存在且位于报告前30%
- ✅ 风险提示中包含逾期和被执行信息
- ✅ 主目标包含风险核实相关内容
- ✅ 沟通策略中包含风险应对建议
- ✅ 包含"建议与风险部门沟通"或类似提示

---

### 用例 3: 首次拜访（正例）

**输入**：
```
客户名称：YY科技创新有限公司
拜访日期：2026-05-20
拜访目的：首次拜访
```

**预期输出**：
- ✅ 包含所有必需章节
- ✅ 拜访类型标注为"首次拜访"
- ✅ 主目标包含信息收集和关系建立内容
- ✅ 沟通策略适合陌生客户场景
- ✅ 行业分类精确
- ✅ 无风险提示章节（首次拜访通常无风险信号）

---

### 用例 4: 数据不完整的降级处理（边界案例）

**输入**：
```
客户名称：ZZ制造有限公司
拜访日期：2026-05-18
拜访目的：定期维护
特殊关注点：客户历史拜访记录缺失
```

**预期输出**：
- ✅ 包含所有必需章节
- ✅ 标注"无历史拜访记录"或类似说明
- ✅ 基于可用信息生成报告
- ✅ 无崩溃或错误
- ✅ 在适当位置说明数据缺失情况

---

### 用例 5: 目标数量超限（反例）

**输入**：
```
客户名称：测试企业
拜访目的：营销推进
```

**预期输出**：
- ❌ 主目标数量不应超过3个
- ✅ 如超过3个，验证脚本应报错
- ✅ 次目标可以有多个，但主目标必须≤3

---

### 用例 6: 行业分类过于宽泛（反例）

**输入**：
```
客户名称：某制造企业
```

**预期输出**：
- ❌ 行业分类不应仅显示"制造业"
- ✅ 应精确到中类或小类，如"C34 通用设备制造业"
- ✅ 验证脚本应检测到并报错

---

### 用例 7: 风险信号埋没在正文中（反例）

**输入**：
```
客户名称：高风险企业
特殊关注点：客户已被列入失信被执行人
```

**预期输出**：
- ❌ 风险提示不应埋没在正文中
- ✅ ⚠️ 风险提示必须在报告开头单独成节
- ✅ 验证脚本应检测风险位置

---

### 用例 8: 超范围请求（拒绝案例）

**输入**：
```
请帮我审批这个客户的授信申请，额度5000万。
```

**预期输出**：
- ✅ Skill 应拒绝执行
- ✅ 回复包含"本 Skill 不提供授信审批决策"或类似说明
- ✅ 建议联系审批部门或使用其他合适工具

---

### 用例 9: 个人信贷请求（拒绝案例）

**输入**：
```
请为我生成个人住房贷款的拜访计划。
```

**预期输出**：
- ✅ Skill 应拒绝执行
- ✅ 回复包含"本 Skill 不处理个人信贷业务"或类似说明
- ✅ 建议联系零售银行部门

---

### 用例 10: 沟通话术个性化检查（正例）

**输入**：
```
客户名称：老客户A公司
拜访目的：关系维护
特殊关注点：与该客户合作5年，关系良好，上次拜访是2个月前
```

**预期输出**：
- ✅ 开场建议体现客户关系深度（如"X总您好，上次我们谈到..."）
- ✅ 沟通策略适合熟悉客户场景
- ✅ 不使用陌生客户话术模板
- ✅ 体现客户具体特征（合作年限、行业等）

---

## 回归测试检查清单

每次更新 Skill 后，重跑以上测试用例，确保：
- [ ] 所有正例仍然通过
- [ ] 所有反例仍然被正确拒绝或报错
- [ ] 输出格式未发生非预期变化
- [ ] 约束条件仍然有效
- [ ] 审计日志格式正确
